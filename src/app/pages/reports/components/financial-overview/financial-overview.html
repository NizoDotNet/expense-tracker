<div class="flex flex-col">
  <h1 class="text-xl text-primary-title font-bold">Financial Overview</h1>
  <div
    class="w-full p-[15px] flex xl:flex-row flex-col flex-wrap lg:justify-between justify-center gap-3 lg:gap-2"
  >
    <div class="flex-1">
      <app-line-chart
        [expenseData]="incomeExpense()!.expense.map(c => c.amount)"
        [incomeData]="incomeExpense().income.map(c => c.amount)"
        [labels]="incomeExpense().labels"
        class="flex justify-center"
      ></app-line-chart>
    </div>
    <div class="flex-1">
      <app-pie-chart
        class="flex justify-center"
        [expensesData]="incomeByCategory().map(c => ({
          category: c.category,
    expense: c.amount
  }))"
      ></app-pie-chart>
    </div>
    <div class="flex-1">
      <app-bar-chart></app-bar-chart>
    </div>
  </div>
</div>
