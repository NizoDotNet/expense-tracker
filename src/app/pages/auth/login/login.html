<div class="flex justify-center items-center">
  <form [formGroup]="form" (ngSubmit)="submit()" class="bg-white flex flex-col items-center gap-4">
    <h1 class="text-2xl font-bold">Sign in</h1>
    <div class="flex flex-col gap-1">
      <input class="form-input" placeholder="Email" formControlName="email" required />
      @if (form.get('email')?.invalid) {
        <span class="text-red-500">Email is invalid</span>
      }
    </div>
    <div class="flex flex-col gap-1">
      <input class="form-input" placeholder="password" formControlName="password" required />
      @if (form.get('password')?.invalid) {
        <span class="text-red-500">Password must contain at least 6 characters</span>
      }
    </div>

    <button
      class="border-0 rounded-lg bg-primary-green uppercase text-white text-[16px] hover:opacity-85 cursor-pointer w-[160px] h-10"
    >
      SIGN IN
    </button>
  </form>
</div>
