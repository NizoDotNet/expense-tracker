<div class="flex flex-col gap-4">
  <div class="p-1 flex md:flex-row flex-col md:items-center md:justify-between gap-2">
    <h2 class="font-bold text-xl">Spending Overview</h2>
    <select>
      <option>1</option>
      <option>1</option>
    </select>
  </div>
  <div
    class="w-full p-[15px] flex xl:flex-row flex-col lg:justify-between justify-center gap-3 lg:gap-2"
  >
    <div class="flex-1">
      <app-line-chart
        [expenseData]="incomeExpense()!.expense.map(c => c.amount)"
        [incomeData]="incomeExpense().income.map(c => c.amount)"
        [labels]="incomeExpense().labels"
        class="flex justify-center"
      ></app-line-chart>
    </div>
    <div class="flex-1">
      <app-pie-chart
        class="flex justify-center"
        [expensesData]="incomeByCategory().map(c => ({
          category: c.category,
    expense: c.amount
  }))"
      ></app-pie-chart>
    </div>
  </div>
  <app-table [data]="transactionResponse()"></app-table>
</div>
