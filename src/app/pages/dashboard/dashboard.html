<div class="flex flex-col gap-6">
  <app-cards [cards]="cards()"></app-cards>
  <div class="p-1 flex md:flex-row flex-col md:items-center md:justify-between gap-2">
    <h2 class="font-bold text-xl">Spending Overview</h2>
    <select name="timePeriod" (change)="changeTimePeriod($event)">
      <option [value]="0">Day</option>
      <option [value]="1">Month</option>
    </select>
  </div>
  @if (byCategory() !== null && incomeExpense() !== null) {
    <app-spending-overview
      [incomeByCategory]="byCategory()!"
      [incomeExpense]="incomeExpense()!"
      [transactionResponse]="transactions()"
    ></app-spending-overview>
  }
</div>
