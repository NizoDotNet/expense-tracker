<div class="flex items-center gap-2 justify-center mt-4">
  <button
    (click)="prev()"
    [disabled]="page() === 1"
    class="px-3 py-1 border rounded disabled:opacity-50"
  >
    Prev
  </button>

  @for (p of pages; track $index) {
    <button
      (click)="goTo(p)"
      [class.bg-blue-500]="p === page()"
      [class.text-white]="p === page()"
      class="px-3 py-1 border rounded cursor-pointer"
    >
      {{ p }}
    </button>
  }

  <button
    (click)="next()"
    [disabled]="page() === total()"
    class="px-3 py-1 border rounded disabled:opacity-50"
  >
    Next
  </button>
</div>
