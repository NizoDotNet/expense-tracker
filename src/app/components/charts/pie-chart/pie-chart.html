<div class="w-full lg:w-[520px] lg:h-[300px] bg-white rounded-xl p-6">
  <div class="w-full flex flex-col">
    <div class="flex flex-col gap-[6px]">
      <h1 class="text-primary-title text-xl">Expense Breakdown</h1>
      <span class="text-sm text-primary-grey">This month spending by category</span>
    </div>
    <div class="flex justify-between items-center">
      <canvas
        class="w-full max-w-[250px] max-h-[350px]"
        baseChart
        type="pie"
        [data]="pieChartData"
        [options]="pieChartOptions"
      ></canvas>
      <div class="flex flex-col gap-3">
        @for (item of getLegendItems(); track $index) {
          <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-sm" [style.background]="item.color"></span>

            <span class="text-sm"> {{ item.label }} - {{ item.value }} </span>
          </div>
        }
      </div>
    </div>
  </div>
</div>
